# ─── SERVER ───────────────────────────────────────────────────────────────────
server.port=8080

# ─── H2 IN-MEMORY DATABASE ────────────────────────────────────────────────────
# Users are stored here — resets on every restart (perfect for demo/codespaces)
spring.datasource.url=jdbc:h2:mem:stockdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Auto-create tables from @Entity classes on startup
spring.jpa.hibernate.ddl-auto=create-drop

# H2 web console: accessible at /h2-console for debugging
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Show SQL queries in logs (set to false in production)
spring.jpa.show-sql=true

# ─── JWT CONFIGURATION ────────────────────────────────────────────────────────
# MUST be at least 32 characters for HS256 algorithm — this is 64 chars
# In production: move to environment variable, never commit to git
jwt.secret=stockanalysis-super-secret-key-minimum-32-chars-for-hs256-algorithm
# Token expires after 24 hours (in milliseconds)
jwt.expiration=86400000

# ─── CORS ─────────────────────────────────────────────────────────────────────
# Configured in SecurityConfig.java to allow GitHub Codespaces wildcard domains

# ─── LOGGING ──────────────────────────────────────────────────────────────────
logging.level.com.stockanalysis=DEBUG
logging.level.org.springframework.security=INFO

# ─── FINTECH ENGINE SETTINGS ──────────────────────────────────────────────────
# Monte Carlo simulation paths (500 gives good distribution without huge JSON)
fintech.monte-carlo.paths=500
# Trading days per year (used for annualising volatility and Sharpe ratio)
fintech.trading-days-per-year=252
# Risk-free rate per year (approximate UK/US rate) — used in Sharpe calculation
fintech.risk-free-rate-annual=0.05
# Years of historical price data to fetch from Yahoo Finance
fintech.history-years=2

# ─── SENTIMENT SETTINGS ───────────────────────────────────────────────────────
# Timeout for RSS feed fetches (ms) — keep short to avoid blocking API responses
sentiment.fetch-timeout-ms=5000
# Number of headlines to return to frontend
sentiment.max-headlines=10
